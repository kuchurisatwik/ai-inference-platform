<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Studio — Image &amp; Video</title>
<style>
  :root { --bg:#0f1216; --panel:#181c22; --line:#2a2f37; --fg:#e7ebf0; --mut:#98a2b3; --acc:#4f8cff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family:system-ui,Segoe UI,Roboto,sans-serif; }
  header { display:flex; align-items:center; gap:16px; padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  .tabs { display:flex; gap:8px; margin-left:8px; }
  .tab { padding:7px 16px; border:1px solid var(--line); border-radius:8px; background:transparent; color:var(--mut); cursor:pointer; font-size:14px; }
  .tab.active { background:var(--acc); color:#fff; border-color:var(--acc); }
  .settings { margin-left:auto; display:flex; gap:8px; align-items:center; font-size:12px; color:var(--mut); }
  .settings input { width:190px; }
  main { display:grid; grid-template-columns:380px 1fr; gap:20px; padding:20px; max-width:1200px; margin:0 auto; }
  @media (max-width:820px){ main{ grid-template-columns:1fr; } }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }
  label { display:block; font-size:12px; color:var(--mut); margin:12px 0 5px; }
  textarea, input, select { width:100%; background:#0f1319; border:1px solid var(--line); color:var(--fg); border-radius:8px; padding:9px 10px; font-size:14px; font-family:inherit; }
  textarea { resize:vertical; min-height:80px; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  button.go { width:100%; margin-top:16px; padding:12px; border:none; border-radius:10px; background:var(--acc); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
  button.go:disabled { opacity:.55; cursor:not-allowed; }
  .hint { font-size:11px; color:var(--mut); margin-top:4px; }
  .output { min-height:300px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:var(--mut); }
  .output img, .output video { max-width:100%; max-height:70vh; border-radius:10px; border:1px solid var(--line); }
  .dl { margin-top:14px; display:inline-block; padding:9px 18px; background:#222833; border:1px solid var(--line); border-radius:8px; color:var(--fg); text-decoration:none; font-size:14px; }
  .spinner { width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--acc); border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .err { color:#ff6b6b; font-size:13px; white-space:pre-wrap; }
  .meta { font-size:12px; color:var(--mut); margin-top:8px; }
</style>
</head>
<body>
<header>
  <h1>🎨 AI Studio</h1>
  <div class="tabs">
    <button class="tab active" id="tab-image" onclick="setMode('image')">Image</button>
    <button class="tab" id="tab-video" onclick="setMode('video')">Video</button>
  </div>
  <div class="settings">
    <span>Image API</span><input id="imageApi" placeholder="http://IMAGE_IP" />
    <span>Video API</span><input id="videoApi" placeholder="http://VIDEO_IP" />
    <span>API Key</span><input id="apiKey" type="password" placeholder="X-API-Key" style="width:130px" />
  </div>
</header>

<main>
  <section class="panel">
    <label>Prompt</label>
    <textarea id="prompt" placeholder="A luxury diamond necklace on black velvet, studio lighting, ultra detailed, 8k"></textarea>
    <div class="hint">Press <b>Enter</b> to generate · <b>Shift+Enter</b> for a new line</div>

    <!-- Image params -->
    <div id="params-image">
      <div class="row">
        <div><label>Width</label><input id="i_width" type="number" value="1024" /></div>
        <div><label>Height</label><input id="i_height" type="number" value="1024" /></div>
      </div>
      <div class="row">
        <div><label>Steps</label><input id="i_steps" type="number" value="4" /></div>
        <div><label>Guidance</label><input id="i_guidance" type="number" step="0.1" value="0" /></div>
      </div>
      <label>Seed (blank = random)</label><input id="i_seed" type="number" placeholder="random" />
    </div>

    <!-- Video params -->
    <div id="params-video" style="display:none">
      <div class="row">
        <div><label>Width</label><input id="v_width" type="number" value="960" /></div>
        <div><label>Height</label><input id="v_height" type="number" value="544" /></div>
      </div>
      <div class="row">
        <div><label>Frames</label><input id="v_frames" type="number" value="81" /></div>
        <div><label>FPS</label><input id="v_fps" type="number" value="24" /></div>
      </div>
      <div class="row">
        <div><label>Steps</label><input id="v_steps" type="number" value="20" /></div>
        <div><label>Guidance</label><input id="v_guidance" type="number" step="0.1" value="5" /></div>
      </div>
      <label>Seed (blank = random)</label><input id="v_seed" type="number" placeholder="random" />
      <label>Input image (optional → image-to-video)</label>
      <input id="v_image" type="file" accept="image/*" />
      <div class="hint">Add an image to animate it (image→video). Leave empty for text→video.</div>
    </div>

    <button class="go" id="go" onclick="generate()">Generate</button>
  </section>

  <section class="panel">
    <div class="output" id="output">Your result will appear here.</div>
  </section>
</main>

<script>
  let mode = "image";

  function api(m){ return (document.getElementById(m+"Api").value || location.origin).replace(/\/+$/,""); }

  function setMode(m){
    mode = m;
    document.getElementById("tab-image").classList.toggle("active", m==="image");
    document.getElementById("tab-video").classList.toggle("active", m==="video");
    document.getElementById("params-image").style.display = m==="image" ? "" : "none";
    document.getElementById("params-video").style.display = m==="video" ? "" : "none";
  }

  function initSettings(){
    for (const k of ["imageApi","videoApi"]){
      const el = document.getElementById(k);
      el.value = localStorage.getItem(k) || location.origin;
      el.addEventListener("change", ()=> localStorage.setItem(k, el.value));
    }
    const key = document.getElementById("apiKey");
    key.value = localStorage.getItem("apiKey") || "";
    key.addEventListener("change", ()=> localStorage.setItem("apiKey", key.value));
  }

  function num(id){ const v = document.getElementById(id).value; return v==="" ? null : Number(v); }

  function fileToDataURL(file){
    return new Promise((res, rej)=>{ const r = new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
  }

  async function body(){
    const prompt = document.getElementById("prompt").value.trim();
    if (mode==="image"){
      return { prompt, width:num("i_width"), height:num("i_height"),
               steps:num("i_steps"), guidance_scale:num("i_guidance"), seed:num("i_seed") };
    }
    const b = { prompt, width:num("v_width"), height:num("v_height"),
                num_frames:num("v_frames"), fps:num("v_fps"), steps:num("v_steps"),
                guidance_scale:num("v_guidance"), seed:num("v_seed") };
    const f = document.getElementById("v_image").files[0];
    if (f) b.image = await fileToDataURL(f);   // enables image-to-video
    return b;
  }

  async function generate(){
    const b = await body();
    if (!b.prompt && !b.image){ show('<span class="err">Please enter a prompt (or add an image).</span>'); return; }
    const base = api(mode);
    const go = document.getElementById("go");
    go.disabled = true;
    const t0 = performance.now();
    show('<div class="spinner"></div><div class="meta">Generating '+mode+'… this can take a while.</div>');
    try {
      const headers = {"Content-Type":"application/json"};
      const key = document.getElementById("apiKey").value.trim();
      if (key) headers["X-API-Key"] = key;
      const res = await fetch(base + "/generate", {
        method:"POST", headers, body:JSON.stringify(b)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
      let url = mode==="image" ? data.image_url : data.video_url;
      if (url.startsWith("/")) url = base + url;   // relative /outputs path -> absolute
      const secs = ((performance.now()-t0)/1000).toFixed(1);
      const media = mode==="image"
        ? '<img src="'+url+'" alt="result" />'
        : '<video src="'+url+'" controls autoplay loop></video>';
      show(media + '<a class="dl" href="'+url+'" download>⬇ Download</a>'
           + '<div class="meta">Done in '+secs+'s · backend: '+(data.backend||"?")+'</div>');
    } catch(e){
      show('<span class="err">Error: '+e.message+'</span>');
    } finally {
      go.disabled = false;
    }
  }

  function show(html){ document.getElementById("output").innerHTML = html; }

  // Enter submits, Shift+Enter = newline
  document.getElementById("prompt").addEventListener("keydown", (e)=>{
    if (e.key==="Enter" && !e.shiftKey){ e.preventDefault(); generate(); }
  });

  initSettings();
</script>
</body>
</html>
