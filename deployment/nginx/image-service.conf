# Phase 7 — NGINX reverse proxy for the image API (public port 80 -> app).
# Install:
#   sudo cp deployment/nginx/image-service.conf /etc/nginx/sites-available/image-service
#   sudo ln -sf /etc/nginx/sites-available/image-service /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default    # remove the "Welcome to nginx" site
#   sudo nginx -t && sudo systemctl reload nginx
# Then reach it at http://YOUR_PUBLIC_IP/
#
# HTTPS (needs a domain pointed at this IP):
#   set server_name to your domain below, reload, then:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d image.yourdomain.com
server {
    listen 80 default_server;
    server_name _;                # serves any host/IP; change to your domain for HTTPS

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # image generation can take a while
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
