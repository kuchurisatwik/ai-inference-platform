# Phase 7 — NGINX reverse proxy for the video API (public port 80 -> app).
# Install:
#   sudo cp deployment/nginx/video-service.conf /etc/nginx/sites-available/video-service
#   sudo ln -sf /etc/nginx/sites-available/video-service /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default    # remove the "Welcome to nginx" site
#   sudo nginx -t && sudo systemctl reload nginx
# Then reach it at http://YOUR_PUBLIC_IP/
#
# HTTPS (needs a domain pointed at this IP):
#   set server_name to your domain below, reload, then:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d video.yourdomain.com
server {
    listen 80 default_server;
    server_name _;                # serves any host/IP; change to your domain for HTTPS

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # video generation takes longer than image
        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
